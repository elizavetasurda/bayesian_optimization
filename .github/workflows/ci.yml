name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]  # Изменено с 3.14 на 3.12

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv venv --python ${{ matrix.python-version }}
        source .venv/bin/activate
        uv pip install -e .
        uv pip install pytest pytest-cov black pylint isort mypy

    - name: Check formatting with Black
      run: |
        source .venv/bin/activate
        black --check src/ main.py

    - name: Check import sorting with isort
      run: |
        source .venv/bin/activate
        isort --check-only src/ main.py

    - name: Lint with Pylint
      run: |
        source .venv/bin/activate
        pylint src/ main.py --fail-under=8.0

    - name: Type check with mypy
      run: |
        source .venv/bin/activate
        mypy src/ --ignore-missing-imports

    - name: Test with pytest
      run: |
        source .venv/bin/activate
        pytest tests/ -v --cov=src --cov-report=xml
      continue-on-error: true  # Если тестов ещё нет

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
