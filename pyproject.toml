[project]
name = "bayesian_optimization"
version = "0.2.0"
description = "Bayesian optimization with constraints using CEI, Penalty, Lagrange, and Barrier methods"
readme = "README.md"
requires-python = ">=3.13"
authors = [
    {name = "elizavetasurda"}
]
dependencies = [
    "numpy>=1.26.0",
    "scipy>=1.11.0",
    "matplotlib>=3.8.0",
    "scikit-learn>=1.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=7.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.pytest.ini_options]
testpaths = ["tests"]
